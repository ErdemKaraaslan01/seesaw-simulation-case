<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Seesaw Simulation</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="info-panel">
        <div>LEFT WEIGHT<br><span id="leftWeight">0.0 kg</span></div>
        <div>NEXT WEIGHT<br><span id="nextWeight">-</span></div>
        <div>RIGHT WEIGHT<br><span id="rightWeight">0.0 kg</span></div>
        <div>TILT ANGLE<br><span id="tiltAngle">0°</span></div>
    </div>

    <div class="scene">
        <div class="seesaw-container">
            <div id="seesaw">
                <div id="plank"></div>
                <div id="pivot"></div>
            </div>
        </div>
    </div>

</body>

</html>
